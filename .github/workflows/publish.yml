# 发布 zlx-ops-sdk 到 PyPI —— Trusted Publishing(OIDC,无需存 token)。
#
# 触发:push 形如 v1.2.3 的 tag。
# 一次性前置(在 pypi.org 配,见 docs 落地 plan §7):
#   项目 zlx-ops-sdk → Publishing → Add a new pending publisher:
#     Owner=zj1123581321  Repo=zlx-ops-sdk  Workflow=publish.yml  Environment=pypi
#
# 设计:build 与 publish 分两个 job。publish job 绑 environment: pypi + id-token: write,
# 这样 OIDC 短期令牌只在发布步骤可用,build 阶段拿不到任何凭据。
name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Sanity check —— py.typed 必须随 wheel 落地
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = glob.glob("dist/zlx_ops_sdk-*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          assert "zlx_ops_sdk/py.typed" in names, f"py.typed 漏出 wheel: {names}"
          print("ok:", whl)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # Trusted Publishing 必需;不存任何 PyPI token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
